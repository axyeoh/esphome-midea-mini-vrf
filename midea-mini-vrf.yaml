
esp32:
  board: esp32dev  # adjust to your variant
  framework:
    type: arduino

logger:
  level: DEBUG

uart:
  id: d1d2_bus
  tx_pin: GPIO17          # adjust to your wiring
  rx_pin: GPIO16          # adjust to your wiring
  baud_rate: 4800
  data_bits: 8
  parity: NONE
  stop_bits: 1
  flow_control_pin: GPIO18  # DE/RE on MAX485 — HIGH during TX, LOW otherwise (matches manunited10's manual DE/RE control)
 
globals:
  - id: unit_address
    type: int
    initial_value: '-1'
  - id: probe_candidate
    type: int
    initial_value: '-1'
  - id: last_mode_nibble
    type: int
    initial_value: '0x02'   # remembers last active mode (cool/heat/dry/fan_only) so "off" can restore it
  - id: is_powered_on
    type: bool
    initial_value: 'false'
 
text_sensor:
  - platform: template
    name: "D1D2 Discovered Unit Address"
    id: discovered_address_sensor
 
  - platform: template
    name: "D1D2 Unit Mode"
    id: mode_sensor
 
sensor:
  - platform: template
    name: "D1D2 Unit Temperature"
    id: temp_sensor
    unit_of_measurement: "°C"
    accuracy_decimals: 1
 
select:
  - platform: template
    name: "D1D2 Unit Mode Control"
    id: mode_select
    optimistic: false
    options:
      - "off"
      - "cool"
      - "heat"
      - "dry"
      - "fan_only"
    set_action:
      - script.execute:
          id: send_mode
          requested_mode: !lambda 'return x;'
 
number:
  - platform: template
    name: "D1D2 Unit Temperature Control"
    id: temp_number
    optimistic: false
    min_value: 17
    max_value: 30
    step: 0.5
    unit_of_measurement: "°C"
    set_action:
      - script.execute:
          id: send_temp
          requested_temp: !lambda 'return x;'
 
button:
  - platform: template
    name: "D1D2 Discover Unit Address"
    on_press:
      - script.execute: discover_unit
 
  - platform: template
    name: "D1D2 Poll Unit Now"
    on_press:
      - script.execute: poll_unit
 
script:
  # ── Probe one candidate address with the real poll frame (cmd=0x23, payload={0x65}) ──
  - id: probe_one
    then:
      - lambda: |-
          uint8_t dest = (uint8_t) id(probe_candidate);
          uint8_t dummy;
          while (id(d1d2_bus)->available()) {
            id(d1d2_bus)->read_byte(&dummy);
          }
 
          auto crc16_modbus = [](std::vector<uint8_t> data) -> uint16_t {
            uint16_t crc = 0xFFFF;
            for (uint8_t b : data) {
              crc ^= b;
              for (int i = 0; i < 8; i++) {
                if (crc & 1) crc = (crc >> 1) ^ 0xA001;
                else crc >>= 1;
              }
            }
            return crc;
          };
 
          std::vector<uint8_t> body;
          body.push_back(0x23);       // CMD_STATUS
          body.push_back(dest);       // RECV_LO
          body.push_back(0x00);       // RECV_HI
          body.push_back(0x64);       // SRC_LO — our own address, outside IDU range 0-5
          body.push_back(0x00);       // SRC_HI
          body.push_back(0x01);       // PAYLEN
          body.push_back(0x65);       // PAYLOAD_POLL_REQUEST
 
          uint16_t crc = crc16_modbus(body);
 
          std::vector<uint8_t> frame;
          frame.push_back(0xAA);
          for (auto b : body) frame.push_back(b);
          frame.push_back(crc & 0xFF);
          frame.push_back((crc >> 8) & 0xFF);
          frame.push_back(0x55);
          frame.push_back(0xFE);
 
          ESP_LOGI("d1d2", "Probing unit %d", dest);
          id(d1d2_bus)->write_array(frame.data(), frame.size());
      - delay: 500ms
      - lambda: |-
          uint8_t dest = (uint8_t) id(probe_candidate);
          std::vector<uint8_t> rx;
          uint8_t b;
          while (id(d1d2_bus)->available()) {
            id(d1d2_bus)->read_byte(&b);
            rx.push_back(b);
          }
 
          if (rx.empty()) {
            ESP_LOGI("d1d2", "Unit %d: no bytes received", dest);
            return;
          }
 
          char hexbuf[3 * 64] = {0};
          char *p = hexbuf;
          for (auto byte : rx) p += sprintf(p, "%02X ", byte);
          ESP_LOGI("d1d2", "Unit %d: RX %d bytes: %s", dest, (int) rx.size(), hexbuf);
 
          // Genuine reply: RECV=0x64 (us), SRC=dest (the unit that answered)
          if (rx.size() >= 18 && rx[0] == 0xAA && rx[2] == 0x64 && rx[4] == dest) {
            id(unit_address) = dest;
            ESP_LOGI("d1d2", "Unit %d: genuine reply - locking address %d", dest, dest);
          } else {
            ESP_LOGW("d1d2", "Unit %d: unexpected reply shape - not locking", dest);
          }
 
  # ── Walk candidates 0-4, stop at the first genuine reply ──
  - id: discover_unit
    then:
      - lambda: 'ESP_LOGW("d1d2", "Starting sweep");'
      - lambda: 'id(unit_address) = -1;'
 
      - lambda: 'id(probe_candidate) = 0;'
      - if:
          condition:
            lambda: 'return id(unit_address) < 0;'
          then:
            - script.execute: probe_one
            - script.wait: probe_one
 
      - lambda: 'id(probe_candidate) = 1;'
      - if:
          condition:
            lambda: 'return id(unit_address) < 0;'
          then:
            - script.execute: probe_one
            - script.wait: probe_one
 
      - lambda: 'id(probe_candidate) = 2;'
      - if:
          condition:
            lambda: 'return id(unit_address) < 0;'
          then:
            - script.execute: probe_one
            - script.wait: probe_one
 
      - lambda: 'id(probe_candidate) = 3;'
      - if:
          condition:
            lambda: 'return id(unit_address) < 0;'
          then:
            - script.execute: probe_one
            - script.wait: probe_one
 
      - lambda: 'id(probe_candidate) = 4;'
      - if:
          condition:
            lambda: 'return id(unit_address) < 0;'
          then:
            - script.execute: probe_one
            - script.wait: probe_one
 
      - lambda: |-
          if (id(unit_address) == -1) {
            ESP_LOGW("d1d2", "No unit responded on addresses 0-4");
            id(discovered_address_sensor).publish_state("none");
          } else {
            ESP_LOGI("d1d2", "Discovery complete - using address %d", id(unit_address));
            id(discovered_address_sensor).publish_state(to_string(id(unit_address)));
            id(poll_unit)->execute();
          }
 
  # ── Poll the locked unit and decode mode/temperature from the reply ──
  - id: poll_unit
    then:
      - lambda: |-
          if (id(unit_address) < 0) {
            ESP_LOGW("d1d2", "No address locked yet - run discovery first");
            return;
          }
 
          uint8_t dest = (uint8_t) id(unit_address);
          uint8_t dummy;
          while (id(d1d2_bus)->available()) {
            id(d1d2_bus)->read_byte(&dummy);
          }
 
          auto crc16_modbus = [](std::vector<uint8_t> data) -> uint16_t {
            uint16_t crc = 0xFFFF;
            for (uint8_t b : data) {
              crc ^= b;
              for (int i = 0; i < 8; i++) {
                if (crc & 1) crc = (crc >> 1) ^ 0xA001;
                else crc >>= 1;
              }
            }
            return crc;
          };
 
          std::vector<uint8_t> body = { 0x23, dest, 0x00, 0x64, 0x00, 0x01, 0x65 };
          uint16_t crc = crc16_modbus(body);
 
          std::vector<uint8_t> frame;
          frame.push_back(0xAA);
          for (auto b : body) frame.push_back(b);
          frame.push_back(crc & 0xFF);
          frame.push_back((crc >> 8) & 0xFF);
          frame.push_back(0x55);
          frame.push_back(0xFE);
 
          id(d1d2_bus)->write_array(frame.data(), frame.size());
      - delay: 500ms
      - lambda: |-
          if (id(unit_address) < 0) return;
 
          std::vector<uint8_t> rx;
          uint8_t b;
          while (id(d1d2_bus)->available()) {
            id(d1d2_bus)->read_byte(&b);
            rx.push_back(b);
          }
 
          if (rx.size() < 18 || rx[0] != 0xAA) {
            ESP_LOGW("d1d2", "Poll: no valid reply (%d bytes)", (int) rx.size());
            return;
          }
 
          // Byte map (per manunited10's controller):
          // [8]  pwr+mode   [7:4]=power (0x4=on) [3:0]=mode
          // [9]  fan        0x80=auto, 1-7=fixed
          // [10] temp       decodeTemp()
          // [17] swing      [7:4]=horizontal [3:0]=vertical
 
          uint8_t pwrMode = rx[8];
          bool on = (pwrMode & 0xF0) == 0x40;
          uint8_t modeNibble = pwrMode & 0x0F;
 
          std::string modeStr;
          switch (modeNibble) {
            case 0x01: modeStr = "fan_only"; break;
            case 0x02: modeStr = "cool";     break;
            case 0x03: modeStr = "heat";     break;
            case 0x06: modeStr = "dry";      break;
            default:   modeStr = "unknown";  break;
          }
 
          id(is_powered_on) = on;
          if (on) id(last_mode_nibble) = modeNibble;
 
          float temp = 24.0f + ((int) rx[10] - 0x80) / 2.0f;
 
          std::string reportedMode = on ? modeStr : "off";
          id(mode_sensor).publish_state(reportedMode);
          id(temp_sensor).publish_state(temp);
 
          // Keep the dashboard controls in sync with what the unit actually reports
          id(mode_select).publish_state(reportedMode);
          id(temp_number).publish_state(temp);
 
          ESP_LOGI("d1d2", "Poll: pwr=%s mode=%s temp=%.1f", on ? "on" : "off", modeStr.c_str(), temp);
 
  # ── Send a mode change (or "off") ──
  - id: send_mode
    parameters:
      requested_mode: string
    then:
      - lambda: |-
          if (id(unit_address) < 0) {
            ESP_LOGW("d1d2", "No unit locked - can't send mode");
            return;
          }
 
          uint8_t dest = (uint8_t) id(unit_address);
          uint8_t pwrNibble, modeNibble;
 
          if (requested_mode == "off") {
            pwrNibble  = 0x00;
            modeNibble = (uint8_t) id(last_mode_nibble);  // retain last active mode
          } else {
            pwrNibble  = 0x40;
            if      (requested_mode == "fan_only") modeNibble = 0x01;
            else if (requested_mode == "cool")      modeNibble = 0x02;
            else if (requested_mode == "heat")      modeNibble = 0x03;
            else if (requested_mode == "dry")       modeNibble = 0x06;
            else                                    modeNibble = 0x02;  // fallback: cool
            id(last_mode_nibble) = modeNibble;
          }
 
          auto crc16_modbus = [](std::vector<uint8_t> data) -> uint16_t {
            uint16_t crc = 0xFFFF;
            for (uint8_t b : data) {
              crc ^= b;
              for (int i = 0; i < 8; i++) {
                if (crc & 1) crc = (crc >> 1) ^ 0xA001;
                else crc >>= 1;
              }
            }
            return crc;
          };
 
          uint8_t combined = pwrNibble | modeNibble;
          std::vector<uint8_t> body = { 0x23, dest, 0x00, 0x64, 0x00, 0x03, 0x01, 0x00, combined };
          uint16_t crc = crc16_modbus(body);
 
          std::vector<uint8_t> frame;
          frame.push_back(0xAA);
          for (auto bb : body) frame.push_back(bb);
          frame.push_back(crc & 0xFF);
          frame.push_back((crc >> 8) & 0xFF);
          frame.push_back(0x55);
          frame.push_back(0xFE);
 
          ESP_LOGI("d1d2", "Sending mode='%s' (combined byte 0x%02X) to unit %d",
                   requested_mode.c_str(), combined, dest);
          id(d1d2_bus)->write_array(frame.data(), frame.size());
      - delay: 600ms
      - script.execute: poll_unit   # refresh sensors/controls with the unit's actual new state
 
  # ── Send a temperature setpoint change ──
  - id: send_temp
    parameters:
      requested_temp: float
    then:
      - lambda: |-
          if (id(unit_address) < 0) {
            ESP_LOGW("d1d2", "No unit locked - can't send temp");
            return;
          }
 
          uint8_t dest = (uint8_t) id(unit_address);
          float c = requested_temp;
          if (c < 17.0f) c = 17.0f;
          if (c > 30.0f) c = 30.0f;
          uint8_t tb = (uint8_t)((c - 24.0f) * 2.0f + 128.0f);
 
          auto crc16_modbus = [](std::vector<uint8_t> data) -> uint16_t {
            uint16_t crc = 0xFFFF;
            for (uint8_t b : data) {
              crc ^= b;
              for (int i = 0; i < 8; i++) {
                if (crc & 1) crc = (crc >> 1) ^ 0xA001;
                else crc >>= 1;
              }
            }
            return crc;
          };
 
          // Sets active/cooling/heating setpoint fields together, per the reference implementation
          std::vector<uint8_t> body = { 0x23, dest, 0x00, 0x64, 0x00, 0x07,
                                         0x01, 0x03, tb, 0x04, tb, 0x02, tb };
          uint16_t crc = crc16_modbus(body);
 
          std::vector<uint8_t> frame;
          frame.push_back(0xAA);
          for (auto bb : body) frame.push_back(bb);
          frame.push_back(crc & 0xFF);
          frame.push_back((crc >> 8) & 0xFF);
          frame.push_back(0x55);
          frame.push_back(0xFE);
 
          ESP_LOGI("d1d2", "Sending temp=%.1f (byte 0x%02X) to unit %d", c, tb, dest);
          id(d1d2_bus)->write_array(frame.data(), frame.size());
      - delay: 600ms
      - script.execute: poll_unit
 
interval:
  - interval: 15s
    then:
      - if:
          condition:
            lambda: 'return id(unit_address) >= 0;'
          then:
            - script.execute: poll_unit
