esp32:
  board: esp32dev  # adjust to your variant
  framework:
    type: arduino

logger:
  level: DEBUG

esphome:
  includes:
    - <array>
  on_boot:
    priority: 900
    then:
      - lambda: 'id(version).publish_state("1");'
      - delay: 3s
      - script.execute: discover_and_assign

uart:
  id: d1d2_bus
  tx_pin: GPIO17          # adjust to your wiring
  rx_pin: GPIO16          # adjust to your wiring
  baud_rate: 4800
  data_bits: 8
  parity: NONE
  stop_bits: 1
  flow_control_pin: GPIO18  # DE/RE on MAX485 — HIGH during TX, LOW otherwise

text_sensor:
  - platform: template
    name: "D1D2 Bridge Version"
    id: version

button:
  - platform: template
    name: "D1D2 Rediscover Units"
    on_press:
      - script.execute: discover_and_assign

# ── State