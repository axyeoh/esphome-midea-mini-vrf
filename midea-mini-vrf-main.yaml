##########################################################################
# BOARD SETUP

esp32:
  board: esp32dev
  framework:
    type: arduino



esphome:
  includes:
    - <array>
  on_boot:
    priority: 900
    then:
      - lambda: 'id(version).publish_state("1");'
      - delay: 3s
      - script.execute: discover_and_assign

uart:
  id: d1d2_bus
  tx_pin: ${uart_tx}          # adjust to your wiring
  rx_pin: ${uart_rx}          # adjust to your wiring
  baud_rate: 4800
  data_bits: 8
  parity: NONE
  stop_bits: 1
  flow_control_pin: GPIO18  # DE/RE on MAX485 — HIGH during TX, LOW otherwise


##########################################################################
# ESPHOME SHARED SENSORS

text_sensor:
  - platform: template
    name: "midea-mini-vrf Version"
    id: version

button:
  - platform: template
    name: "Rescan Midea Bus"
    on_press:
      - script.execute: discover_and_assign


##########################################################################
# STATE STORAGE, PER SLOT.
#
# Everything below is indexed by SLOT (0..7) — the position an indoor unit
# was assigned to, NOT the real Midea bus/unit ID. g_slot_unit_id is the
# only array that knows the real bus ID; every other array/entity only
# ever deals in slot numbers. Translation slot -> bus ID happens inside
# the generic scripts below, right where a UART frame is built/parsed.

globals:
  - id: g_current_temp
    type: std::array<float, 8>
    initial_value: '{0}'
  - id: g_reported_mode
    type: std::array<std::string, 8>
    initial_value: '{""}'
  - id: g_last_mode_nibble
    type: std::array<uint8_t, 8>
    initial_value: '{0x02,0x02,0x02,0x02,0x02,0x02,0x02,0x02}'
  - id: g_is_powered_on
    type: std::array<bool, 8>
    initial_value: '{false}'
  - id: g_poll_ok
    type: std::array<bool, 8>
    initial_value: '{false}'

  - id: g_current_address_scan_index
    type: int
    initial_value: '0'

  # slot -> real Midea bus unit ID, -1 = unassigned. Persisted across reboots.
  - id: g_slot_unit_id
    type: std::array<int, 8>
    restore_value: true
    initial_value: '{-1,-1,-1,-1,-1,-1,-1,-1}'

  # slot -> entity pointers. Each per-unit include registers its own
  # entities into these at boot, so the generic scripts below can publish
  # state without knowing any compile-time entity ids.
  - id: g_temp_sensor_ptr
    type: std::array<sensor::Sensor*, 8>
    initial_value: '{nullptr}'
  - id: g_mode_sensor_ptr
    type: std::array<text_sensor::TextSensor*, 8>
    initial_value: '{nullptr}'
  - id: g_unit_id_sensor_ptr
    type: std::array<text_sensor::TextSensor*, 8>
    initial_value: '{nullptr}'
  - id: g_mode_select_ptr
    type: std::array<select::Select*, 8>
    initial_value: '{nullptr}'
  - id: g_temp_number_ptr
    type: std::array<number::Number*, 8>
    initial_value: '{nullptr}'
  - id: g_present_ptr
    type: std::array<binary_sensor::BinarySensor*, 8>
    initial_value: '{nullptr}'

script:
  # ── Sweep the bus, fill any empty slots with newly-found addresses. ──
  - id: discover_and_assign
    then:
      - lambda: 'id(g_current_address_scan_index) = 0;'
      - while:
          condition:
            lambda: 'return id(g_current_address_scan_index) < ${max_unit_id};'
          then:
            - script.execute: probe_one_addr
            - script.wait: probe_one_addr
      - script.execute: poll_all_assigned

  - id: probe_one_addr
    then:
      - lambda: |-
          int addr = id(g_current_address_scan_index);

          ESP_LOGI("d1d2", "Probing address %d", addr);

          bool already = false;
          for (int s = 0; s < 8; s++) if (id(g_slot_unit_id)[s] == addr) { already = true; break; }
          if (already) { id(g_current_address_scan_index) = addr + 1; return; }

          int slot = -1;
          for (int s = 0; s < 8; s++) if (id(g_slot_unit_id)[s] == -1) { slot = s; break; }
          if (slot == -1) { id(g_current_address_scan_index) = ${max_unit_id}; return; }  // all slots full, end scan

          uint8_t dummy;
          while (id(d1d2_bus)->available()) id(d1d2_bus)->read_byte(&dummy);

          auto crc16_modbus = [](std::vector<uint8_t> data) -> uint16_t {
            uint16_t crc = 0xFFFF;
            for (uint8_t b : data) {
              crc ^= b;
              for (int i = 0; i < 8; i++) {
                if (crc & 1) crc = (crc >> 1) ^ 0xA001;
                else crc >>= 1;
              }
            }
            return crc;
          };

          std::vector<uint8_t> body = { 0x23, (uint8_t) addr, 0x00, 0x64, 0x00, 0x01, 0x65 };
          uint16_t crc = crc16_modbus(body);
          std::vector<uint8_t> frame = {0xAA};
          for (auto b : body) frame.push_back(b);
          frame.push_back(crc & 0xFF);
          frame.push_back((crc >> 8) & 0xFF);
          frame.push_back(0x55);
          frame.push_back(0xFE);
          id(d1d2_bus)->write_array(frame.data(), frame.size());
      - delay: 500ms
      - lambda: |-
          int addr = id(g_current_address_scan_index);
          std::vector<uint8_t> rx;
          uint8_t b;
          while (id(d1d2_bus)->available()) {
            id(d1d2_bus)->read_byte(&b);
            rx.push_back(b);
          }

          if (rx.size() >= 18 && rx[0] == 0xAA && rx[2] == 0x64 && rx[4] == addr) {
            for (int s = 0; s < 8; s++) {
              if (id(g_slot_unit_id)[s] == -1) {
                id(g_slot_unit_id)[s] = addr;
                ESP_LOGI("d1d2", "Assigned bus address %d -> slot %d", addr, s);
                break;
              }
            }
          }
          id(g_current_address_scan_index) = addr + 1;

  # ── Poll every currently-assigned slot once (used after discovery). ──
  - id: poll_all_assigned
    then:
      - lambda: |-
          for (int s = 0; s < 8; s++) {
            if (id(g_slot_unit_id)[s] >= 0) id(poll_and_publish_slot)->execute(s);
          }

  # ── Poll one unit by slot. Translates slot -> real bus ID internally. ──
  - id: poll_unit_by_slot
    mode: queued
    parameters:
      slot: int
    then:
      - lambda: |-
          if (slot < 0 || slot >= 8) { ESP_LOGE("d1d2", "poll: slot %d out of range", slot); return; }
          int addr = id(g_slot_unit_id)[slot];
          if (addr < 0) { ESP_LOGW("d1d2", "poll: slot %d not assigned", slot); id(g_poll_ok)[slot] = false; return; }
          uint8_t dest = (uint8_t) addr;
          uint8_t dummy;
          while (id(d1d2_bus)->available()) id(d1d2_bus)->read_byte(&dummy);

          auto crc16_modbus = [](std::vector<uint8_t> data) -> uint16_t {
            uint16_t crc = 0xFFFF;
            for (uint8_t b : data) {
              crc ^= b;
              for (int i = 0; i < 8; i++) {
                if (crc & 1) crc = (crc >> 1) ^ 0xA001;
                else crc >>= 1;
              }
            }
            return crc;
          };

          std::vector<uint8_t> body = { 0x23, dest, 0x00, 0x64, 0x00, 0x01, 0x65 };
          uint16_t crc = crc16_modbus(body);

          std::vector<uint8_t> frame;
          frame.push_back(0xAA);
          for (auto b : body) frame.push_back(b);
          frame.push_back(crc & 0xFF);
          frame.push_back((crc >> 8) & 0xFF);
          frame.push_back(0x55);
          frame.push_back(0xFE);

          id(d1d2_bus)->write_array(frame.data(), frame.size());
      - delay: 500ms
      - lambda: |-
          if (slot < 0 || slot >= 8) return;
          int addr = id(g_slot_unit_id)[slot];
          if (addr < 0) return;
          uint8_t dest = (uint8_t) addr;

          std::vector<uint8_t> rx;
          uint8_t b;
          while (id(d1d2_bus)->available()) {
            id(d1d2_bus)->read_byte(&b);
            rx.push_back(b);
          }

          if (rx.size() < 18 || rx[0] != 0xAA) {
            ESP_LOGW("d1d2", "Unit %d (slot %d) poll: no valid reply (%d bytes)", dest, slot, (int) rx.size());
            id(g_poll_ok)[slot] = false;
            return;
          }

          uint8_t pwrMode = rx[8];
          bool on = (pwrMode & 0xF0) == 0x40;
          uint8_t modeNibble = pwrMode & 0x0F;

          std::string modeStr;
          switch (modeNibble) {
            case 0x01: modeStr = "fan_only"; break;
            case 0x02: modeStr = "cool";     break;
            case 0x03: modeStr = "heat";     break;
            case 0x06: modeStr = "dry";      break;
            default:   modeStr = "unknown";  break;
          }

          id(g_is_powered_on)[slot] = on;
          if (on) id(g_last_mode_nibble)[slot] = modeNibble;

          id(g_current_temp)[slot] = 24.0f + ((int) rx[10] - 0x80) / 2.0f;
          id(g_reported_mode)[slot] = on ? modeStr : "off";
          id(g_poll_ok)[slot] = true;

          ESP_LOGI("d1d2", "Unit %d (slot %d): pwr=%s mode=%s temp=%.1f",
                   dest, slot, on ? "on" : "off", modeStr.c_str(), id(g_current_temp)[slot]);

  # ── Push current global state for a slot out to its HA entities. ──
  - id: publish_slot
    mode: queued
    parameters:
      slot: int
    then:
      - lambda: |-
          if (slot < 0 || slot >= 8) return;
          int addr = id(g_slot_unit_id)[slot];
          if (id(g_mode_sensor_ptr)[slot])    id(g_mode_sensor_ptr)[slot]->publish_state(id(g_reported_mode)[slot]);
          if (id(g_temp_sensor_ptr)[slot])    id(g_temp_sensor_ptr)[slot]->publish_state(id(g_current_temp)[slot]);
          if (id(g_mode_select_ptr)[slot])    id(g_mode_select_ptr)[slot]->publish_state(id(g_reported_mode)[slot]);
          if (id(g_temp_number_ptr)[slot])    id(g_temp_number_ptr)[slot]->publish_state(id(g_current_temp)[slot]);
          if (id(g_present_ptr)[slot])        id(g_present_ptr)[slot]->publish_state(id(g_poll_ok)[slot]);
          if (id(g_unit_id_sensor_ptr)[slot]) {
            id(g_unit_id_sensor_ptr)[slot]->publish_state(addr >= 0 ? std::to_string(addr) : std::string("unassigned"));
          }

  # ── Poll a slot then publish its entities. This is what each unit's
  #    "poll now" button and 15s interval actually call. ──
  - id: poll_and_publish_slot
    mode: queued
    parameters:
      slot: int
    then:
      - script.execute:
          id: poll_unit_by_slot
          slot: !lambda 'return slot;'
      - script.wait: poll_unit_by_slot
      - script.execute:
          id: publish_slot
          slot: !lambda 'return slot;'
      - script.wait: publish_slot

  # ── Set mode on a slot: checks assignment, sends, re-polls + publishes. ──
  - id: set_mode_by_slot
    mode: queued
    parameters:
      slot: int
      requested_mode: string
    then:
      - if:
          condition:
            lambda: 'return slot >= 0 && slot < 8 && id(g_slot_unit_id)[slot] >= 0;'
          then:
            - script.execute:
                id: send_mode_by_slot
                slot: !lambda 'return slot;'
                requested_mode: !lambda 'return requested_mode;'
            - script.wait: send_mode_by_slot
            - script.execute:
                id: poll_and_publish_slot
                slot: !lambda 'return slot;'
            - script.wait: poll_and_publish_slot
          else:
            - lambda: 'ESP_LOGW("d1d2", "set_mode: slot %d not assigned, ignoring", slot);'

  # ── Set temperature on a slot: checks assignment, sends, re-polls + publishes. ──
  - id: set_temp_by_slot
    mode: queued
    parameters:
      slot: int
      requested_temp: float
    then:
      - if:
          condition:
            lambda: 'return slot >= 0 && slot < 8 && id(g_slot_unit_id)[slot] >= 0;'
          then:
            - script.execute:
                id: send_temp_by_slot
                slot: !lambda 'return slot;'
                requested_temp: !lambda 'return requested_temp;'
            - script.wait: send_temp_by_slot
            - script.execute:
                id: poll_and_publish_slot
                slot: !lambda 'return slot;'
            - script.wait: poll_and_publish_slot
          else:
            - lambda: 'ESP_LOGW("d1d2", "set_temp: slot %d not assigned, ignoring", slot);'

  # ── Send a mode change by slot. Translates slot -> real bus ID internally. ──
  - id: send_mode_by_slot
    mode: queued
    parameters:
      slot: int
      requested_mode: string
    then:
      - lambda: |-
          if (slot < 0 || slot >= 8) { ESP_LOGE("d1d2", "send_mode: slot %d out of range", slot); return; }
          int addr = id(g_slot_unit_id)[slot];
          if (addr < 0) { ESP_LOGW("d1d2", "send_mode: slot %d not assigned", slot); return; }
          uint8_t dest = (uint8_t) addr;
          uint8_t pwrNibble, modeNibble;

          if (requested_mode == "off") {
            pwrNibble  = 0x00;
            modeNibble = id(g_last_mode_nibble)[slot];
          } else {
            pwrNibble  = 0x40;
            if      (requested_mode == "fan_only") modeNibble = 0x01;
            else if (requested_mode == "cool")      modeNibble = 0x02;
            else if (requested_mode == "heat")      modeNibble = 0x03;
            else if (requested_mode == "dry")       modeNibble = 0x06;
            else                                    modeNibble = 0x02;
            id(g_last_mode_nibble)[slot] = modeNibble;
          }

          auto crc16_modbus = [](std::vector<uint8_t> data) -> uint16_t {
            uint16_t crc = 0xFFFF;
            for (uint8_t b : data) {
              crc ^= b;
              for (int i = 0; i < 8; i++) {
                if (crc & 1) crc = (crc >> 1) ^ 0xA001;
                else crc >>= 1;
              }
            }
            return crc;
          };

          uint8_t combined = pwrNibble | modeNibble;
          std::vector<uint8_t> body = { 0x23, dest, 0x00, 0x64, 0x00, 0x03, 0x01, 0x00, combined };
          uint16_t crc = crc16_modbus(body);

          std::vector<uint8_t> frame;
          frame.push_back(0xAA);
          for (auto bb : body) frame.push_back(bb);
          frame.push_back(crc & 0xFF);
          frame.push_back((crc >> 8) & 0xFF);
          frame.push_back(0x55);
          frame.push_back(0xFE);

          ESP_LOGI("d1d2", "Unit %d (slot %d): sending mode='%s' (0x%02X)", dest, slot, requested_mode.c_str(), combined);
          id(d1d2_bus)->write_array(frame.data(), frame.size());
      - delay: 600ms

  # ── Send a temperature setpoint by slot. Translates slot -> real bus ID internally. ──
  - id: send_temp_by_slot
    mode: queued
    parameters:
      slot: int
      requested_temp: float
    then:
      - lambda: |-
          if (slot < 0 || slot >= 8) { ESP_LOGE("d1d2", "send_temp: slot %d out of range", slot); return; }
          int addr = id(g_slot_unit_id)[slot];
          if (addr < 0) { ESP_LOGW("d1d2", "send_temp: slot %d not assigned", slot); return; }
          uint8_t dest = (uint8_t) addr;
          float c = requested_temp;
          if (c < 17.0f) c = 17.0f;
          if (c > 30.0f) c = 30.0f;
          uint8_t tb = (uint8_t)((c - 24.0f) * 2.0f + 128.0f);

          auto crc16_modbus = [](std::vector<uint8_t> data) -> uint16_t {
            uint16_t crc = 0xFFFF;
            for (uint8_t b : data) {
              crc ^= b;
              for (int i = 0; i < 8; i++) {
                if (crc & 1) crc = (crc >> 1) ^ 0xA001;
                else crc >>= 1;
              }
            }
            return crc;
          };

          std::vector<uint8_t> body = { 0x23, dest, 0x00, 0x64, 0x00, 0x07,
                                         0x01, 0x03, tb, 0x04, tb, 0x02, tb };
          uint16_t crc = crc16_modbus(body);

          std::vector<uint8_t> frame;
          frame.push_back(0xAA);
          for (auto bb : body) frame.push_back(bb);
          frame.push_back(crc & 0xFF);
          frame.push_back((crc >> 8) & 0xFF);
          frame.push_back(0x55);
          frame.push_back(0xFE);

          ESP_LOGI("d1d2", "Unit %d (slot %d): sending temp=%.1f (0x%02X)", dest, slot, c, tb);
          id(d1d2_bus)->write_array(frame.data(), frame.size());
      - delay: 600ms