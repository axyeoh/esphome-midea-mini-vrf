# variables:

# unit_slot: the slot index you are assigning to this unit, starting at 0.
#            This IS the array index used throughout main.yaml — there is
#            no separate translation needed here. Real Midea bus IDs are
#            only ever looked up inside the generic scripts in main.yaml.
# unit_name: will be used as a prefix for all the sensors etc.


esphome:
  on_boot:
    then:
      # Register this unit's entities so the generic scripts in main.yaml
      # can publish to them without knowing any entity ids at compile time.
      - lambda: |-
          id(g_temp_sensor_ptr)[${unit_slot}]    = id(temp_sensor_${unit_slot});
          id(g_mode_sensor_ptr)[${unit_slot}]    = id(mode_sensor_${unit_slot});
          id(g_unit_id_sensor_ptr)[${unit_slot}] = id(unit_id_${unit_slot});
          id(g_mode_select_ptr)[${unit_slot}]    = id(mode_select_${unit_slot});
          id(g_temp_number_ptr)[${unit_slot}]    = id(temp_number_${unit_slot});
          id(g_present_ptr)[${unit_slot}]        = id(present_${unit_slot});


binary_sensor:
  - platform: template
    name: "${unit_name} Present"
    id: present_${unit_slot}
    device_class: connectivity

text_sensor:
  - platform: template
    name: "${unit_name} Mode"
    id: mode_sensor_${unit_slot}
  - platform: template
    name: "${unit_name} Bus ID"
    id: unit_id_${unit_slot}


sensor:
  - platform: template
    name: "${unit_name} Temperature"
    id: temp_sensor_${unit_slot}
    unit_of_measurement: "°C"
    accuracy_decimals: 1

select:
  - platform: template
    name: "${unit_name} Mode Control"
    id: mode_select_${unit_slot}
    optimistic: false
    options: ["off", "cool", "heat", "dry", "fan_only"]
    set_action:
      - script.execute:
          id: set_mode_by_slot
          slot: ${unit_slot}
          requested_mode: !lambda 'return x;'

number:
  - platform: template
    name: "${unit_name} Temperature Control"
    id: temp_number_${unit_slot}
    optimistic: false
    min_value: 17
    max_value: 30
    step: 0.5
    unit_of_measurement: "°C"
    set_action:
      - script.execute:
          id: set_temp_by_slot
          slot: ${unit_slot}
          requested_temp: !lambda 'return x;'

button:
  - platform: template
    name: "${unit_name} Poll Now"
    on_press:
      - script.execute:
          id: poll_and_publish_slot
          slot: ${unit_slot}